<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hafa Code Preview</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: white;
      }

      iframe {
        display: block;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="preview" title="Student web page" sandbox="allow-scripts allow-modals" referrerpolicy="no-referrer"></iframe>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search)
        const parentOrigin = params.get('parent') || ''
        const preview = document.getElementById('preview')
        let previewPort = null
        let consolePort = null

        if (!parentOrigin) return

        const connectPreviewFrame = () => {
          previewPort?.close()
          const channel = new MessageChannel()
          previewPort = channel.port1
          previewPort.onmessage = (event) => applyPreviewUpdate(event.data)
          previewPort.start()
          window.parent.postMessage({ source: 'hafa-code-preview-connect' }, parentOrigin, [channel.port2])
        }

        const applyPreviewUpdate = (message) => {
          if (message?.source === 'hafa-code-preview-update' && typeof message.html === 'string') {
            consolePort?.close()
            consolePort = null
            preview.srcdoc = message.html
          }
        }

        window.addEventListener('message', (event) => {
          if (event.source === preview.contentWindow) {
            const message = event.data
            const port = event.ports[0]
            if (message?.source === 'hafa-code-preview-console-connect' && port && !consolePort) {
              consolePort = port
              consolePort.onmessage = (portEvent) => previewPort?.postMessage(portEvent.data)
              consolePort.start()
            }
            return
          }
        })

        connectPreviewFrame()
      })()
    </script>
  </body>
</html>
