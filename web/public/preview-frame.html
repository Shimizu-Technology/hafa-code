<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hafa Code Preview</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: white;
      }

      iframe {
        display: block;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="preview" title="Student web page" sandbox="allow-scripts allow-modals" referrerpolicy="no-referrer"></iframe>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search)
        const parentOrigin = params.get('parent') || ''
        const preview = document.getElementById('preview')
        let previewPort = null
        let consolePort = null

        if (!parentOrigin) return

        const connectPreviewConsole = () => {
          if (!previewPort || !preview.contentWindow) return

          consolePort?.close()
          const channel = new MessageChannel()
          consolePort = channel.port1
          consolePort.onmessage = (event) => previewPort?.postMessage(event.data)
          consolePort.start()

          preview.contentWindow.postMessage({ source: 'hafa-code-preview-console-connect' }, '*', [channel.port2])
        }

        const applyPreviewUpdate = (message) => {
          if (message?.source === 'hafa-code-preview-update' && typeof message.html === 'string') {
            preview.srcdoc = message.html
            preview.onload = connectPreviewConsole
          }
        }

        window.addEventListener('message', (event) => {
          if (event.origin !== parentOrigin) return

          const message = event.data
          if (message?.source === 'hafa-code-preview-connect' && event.ports[0]) {
            previewPort?.close()
            previewPort = event.ports[0]
            previewPort.onmessage = (portEvent) => applyPreviewUpdate(portEvent.data)
            previewPort.start()
            connectPreviewConsole()
          }
        })
      })()
    </script>
  </body>
</html>
